# Yerel geliştirme ortamı (docs/28 §2 — bulutta dev ortamı YOK).
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: dockly
      POSTGRES_PASSWORD: dockly
      POSTGRES_DB: dockly_dev
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dockly -d dockly_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./apps/api
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://dockly:dockly@db:5432/dockly_dev
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  dbdata:
