# Gitleaks yapılandırması (docs/29 SEC hijyeni).
# Varsayılan kural seti AYNEN geçerli; tek istisna: örnek/şablon env dosyası.
# Gerekçe: .env.example tanımı gereği gerçek secret içermez; içine yazılan
# PEM/placeholder kalıpları geçmiş commit'lerde kalıcı sahte alarm üretir.
# Gerçek .env dosyaları .gitignore'dadır ve taramaya TABİDİR.

[extend]
useDefault = true

[allowlist]
description = "Gerçek secret barındırmayan dosyalar"
paths = [
  # Şablon env dosyası — tanımı gereği gerçek secret içermez.
  '''apps/api/\.env\.example$''',
  # Firebase WEB yapılandırması: apiKey vb. değerler Google tasarımı gereği
  # HERKESE AÇIK tanımlayıcılardır (şifre/secret değildir); istemciye gömülür.
  # Erişim güvenliği Firebase Authentication kuralları + yetkili alan adları
  # (moorira.com) ile sağlanır. Bkz. docs/24 §7.1 ve dosya içi açıklama.
  '''apps/mobile/lib/core/firebase_options\.dart$''',
]
