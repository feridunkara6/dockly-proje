name: dockly_ui
description: Dockly tasarım sistemi — tema token'ları ve ortak widget'lar (docs/09, docs/10).
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  # Çizgi ikonları SVG (path tabanlı) olarak çizer — ikon fontuna bağlı değildir,
  # bu yüzden web'de (mobil Safari dahil) güvenilir görünür.
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
