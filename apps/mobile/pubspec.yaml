name: dockly_mobile
description: Dockly mobil uygulaması (docs/26). İskelet — auth ekranları 2.4b'de.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  # Dil desteği (TR/EN/ES/RU): Material bileşen çevirileri.
  flutter_localizations:
    sdk: flutter
  # Firebase kimlik köprüsü (docs/23 §3): giriş Firebase'de, oturum bizim
  # sunucuda. Sürümler Flutter 3.27 (Dart 3.6) ile uyumlu ailede sabitlenir.
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  flutter_riverpod: ^2.5.1
  mapbox_maps_flutter: ^2.22.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.2
  # GPS — MOBİL (mağaza fazı): iOS/Android'de gerçek konum; web tarayıcı API'sini
  # kullanmayı sürdürür (koşullu import, location_service_*.dart).
  geolocator: ^13.0.2
  # Refresh token mobilde Keychain/Keystore'da (mağaza fazı, denetim bulgusu);
  # web'de shared_preferences sürer (rotasyon + aile iptaliyle dengeli karar).
  flutter_secure_storage: ^9.2.2
  dockly_api:
    path: ../../packages/dockly_api
  dockly_core:
    path: ../../packages/dockly_core
  dockly_ui:
    path: ../../packages/dockly_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/splash/
