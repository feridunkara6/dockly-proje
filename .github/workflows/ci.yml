# CI hattı (docs/28 §3). Biçimlendirme ve lockfile bot tarafından senkronlanır;
# hata özetleri annotation olarak yayınlanır (giriş gerektirmeden okunabilir).
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      db:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: dockly
          POSTGRES_PASSWORD: dockly
          POSTGRES_DB: dockly_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dockly -d dockly_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      NODE_ENV: test
      CI: "true"
      DATABASE_URL: postgresql://dockly:dockly@localhost:5432/dockly_test
      REDIS_URL: redis://localhost:6379
      FIREBASE_PROJECT_ID: dockly-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lockfile senkronu (package.json değişince tazele ve commit'le)
        run: |
          npm install --package-lock-only --no-audit --no-fund
          if [ -n "$(git status --porcelain package-lock.json)" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add package-lock.json
              git commit -m "build: package-lock.json senkronu"
              git push origin HEAD:main \
                || { git fetch origin main && git rebase origin/main && git push origin HEAD:main; } \
                || echo "::notice::Lockfile push atlandı — başka koşu güncelledi."
            fi
          fi
      - name: Bağımlılık kurulumu (deterministik)
        run: npm ci --no-audit --no-fund
      - name: Test JWT anahtarları üret (yalnız CI ortamı)
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out /tmp/jwt.pem 2>/dev/null
          openssl pkey -in /tmp/jwt.pem -pubout -out /tmp/jwt.pub
          {
            echo "JWT_PRIVATE_KEY_PEM<<PEMEOF"; cat /tmp/jwt.pem; echo "PEMEOF"
            echo "JWT_PUBLIC_KEY_PEM<<PEMEOF"; cat /tmp/jwt.pub; echo "PEMEOF"
          } >> "$GITHUB_ENV"
      - run: npx prisma validate
      - run: npx prisma generate
      - name: Migration'ları gerçek PostGIS'e uygula
        run: npx prisma migrate deploy
      - name: Seed idempotency kontrolü (iki kez koşar)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/seed.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/seed.sql
      - name: Spatial doğrulama paketi (gerçek PostGIS)
        run: |
          if ! psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/tests/spatial_validation.sql 2>&1 | tee /tmp/spatial.log; then
            echo "::error title=Spatial::$(grep -E 'ERROR|EXCEPTION' /tmp/spatial.log | head -3 | tr '\n' ' § ')"
            exit 1
          fi
      - run: npm run lint
      - name: Prettier — otomatik biçimlendir ve gerekirse bot commit'i at
        run: |
          npx prettier --write "src/**/*.ts" "test/**/*.ts"
          if ! git diff --quiet; then
            if [ "${{ github.event_name }}" = "push" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add -A
              git commit -m "style: prettier otomatik biçimlendirme"
              git push origin HEAD:main \
                || { git fetch origin main && git rebase origin/main && git push origin HEAD:main; } \
                || echo "::notice::Stil push atlandı — başka koşu güncelledi."
              echo "Biçimlendirme düzeltildi ve commit'lendi."
            fi
          fi
      - name: Testler (coverage kapılı)
        run: |
          if ! npm run test:cov 2>&1 | tee /tmp/test.log; then
            echo "::error title=Testler::$(grep -E '●|✕|FAIL|Tests:|Coverage' /tmp/test.log | head -8 | tr '\n' ' § ')"
            exit 1
          fi
      - name: Build (tsc)
        run: |
          if ! npm run build 2>&1 | tee /tmp/build.log; then
            echo "::error title=Build::$(grep -E 'error TS' /tmp/build.log | head -6 | tr '\n' ' § ')"
            exit 1
          fi
      - name: Docker imajı build
        run: docker build -t dockly-api:ci .
      - name: Canlı imaj smoke testi — /readyz 200 dönmeli
        run: |
          docker run -d --name api-smoke --network host \
            -e NODE_ENV=staging -e PORT=3100 \
            -e DATABASE_URL="$DATABASE_URL" -e REDIS_URL="$REDIS_URL" \
            -e FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            -e JWT_PRIVATE_KEY_PEM="$JWT_PRIVATE_KEY_PEM" \
            -e JWT_PUBLIC_KEY_PEM="$JWT_PUBLIC_KEY_PEM" \
            dockly-api:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/readyz; then exit 0; fi
            sleep 1
          done
          echo "::error title=Smoke::$(docker logs api-smoke 2>&1 | tail -5 | tr '\n' ' § ')"
          exit 1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Bağımlılık kurulumu
        working-directory: apps/api
        run: npm install --no-audit --no-fund
      - name: Dependency vulnerability scan
        working-directory: apps/api
        run: |
          if ! npm audit --audit-level=high 2>&1 | tee /tmp/audit.log; then
            echo "::error title=Audit::$(grep -E 'high|critical|Severity' /tmp/audit.log | head -6 | tr '\n' ' § ')"
            exit 1
          fi
      - name: License compliance (yalnız izinli lisanslar)
        working-directory: apps/api
        run: |
          if ! npx license-checker --production --excludePrivatePackages --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;BlueOak-1.0.0;CC0-1.0;Unlicense;Python-2.0" 2>&1 | tee /tmp/lic.log; then
            echo "::error title=Lisans::$(tail -3 /tmp/lic.log | tr '\n' ' § ')"
            exit 1
          fi
      - name: SAST (semgrep — OWASP kural setleri)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-ten p/typescript
      - name: Docker imaj build (tarama için)
        working-directory: apps/api
        run: docker build -t dockly-api:scan .
      - name: Trivy imaj taraması (HIGH/CRITICAL kırar)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: dockly-api:scan
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
